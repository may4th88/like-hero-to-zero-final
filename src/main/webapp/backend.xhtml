<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<!-- ✅ RICHTIG platziert -->
<f:metadata>
	<f:viewAction action="#{authController.ensureLoggedIn}" />
</f:metadata>

<h:head>
	<meta charset="UTF-8" />
	<title>Backend</title>
</h:head>

<h:body>

	<h2>#{authController.welcomeText}</h2>


	<!-- Logout -->
	<h:form>
		<p:commandButton value="Logout" icon="pi pi-sign-out"
			action="#{authController.logout}" ajax="false" />
	</h:form>

	<!-- Menü -->
	<h:form id="menuForm">
		<p:commandButton value="CO₂-Daten anzeigen" icon="pi pi-table"
			action="#{backendController.showEmissionsTable}" update="backendForm" />
	</h:form>

	<!-- Hauptbereich -->
	<h:form id="backendForm">

		<!-- Neue Daten -->
		<p:commandButton value="Neue Daten hinzufügen" icon="pi pi-plus"
			actionListener="#{emissionsController.prepareNewEmission}"
			update=":backendForm:editDialog" oncomplete="PF('editDialog').show()"
			rendered="#{authController.scientist}" style="margin-bottom:15px" />

					<!-- 
		    WICHTIGER HINWEIS ZUM LAYOUT:
		
		    Ursprünglich wurde hier ein <p:panelGrid> mit styleClass="ui-fluid"
		    und dem Standard-Layout verwendet. PrimeFaces aktiviert dadurch
		    automatisch das responsive Grid-System (ui-grid, ui-g-* Klassen).
		
		    In Kombination mit rendered-Attributen führte dies dazu, dass
		    leere Grid-Zellen erzeugt wurden. Das Resultat war eine visuell
		    versetzte Darstellung der Label- und Input-Felder im Dialog.
		
		    Lösung:
		    Das Layout wurde auf layout="tabular" umgestellt.
		    Dadurch wird ein klassisches HTML-Tabellenlayout verwendet,
		    welches eine stabile 2-Spalten-Struktur garantiert.
		
		    styleClass="ui-fluid" wurde bewusst entfernt,
		    um das PrimeFaces Grid-System zu deaktivieren.
		-->
		<!-- Dialog -->
		<p:dialog id="editDialog"
          widgetVar="editDialog"
          modal="true"
          closable="true"
          width="600"
          header="#{emissionsController.newMode
                       ? 'Neue CO₂-Daten hinzufügen'
                       : (authController.scientist
                           ? 'CO₂-Daten bearbeiten'
                           : 'CO₂-Daten validieren')}">

    <p:messages id="dlgMsgs" />

    <p:panelGrid columns="2"
                 layout="tabular"
                 style="width:100%"
                 columnClasses="labelCol,valueCol">

        <p:outputLabel value="Land:" />
        <p:selectOneMenu value="#{emissionsController.selectedCountryId}"
                         disabled="#{!emissionsController.newMode}">
            <f:selectItems value="#{emissionsController.countries}"
                           var="c"
                           itemValue="#{c.id}"
                           itemLabel="#{c.name}" />
        </p:selectOneMenu>

        <p:outputLabel value="Jahr:" />
        <p:inputText value="#{emissionsController.selectedEmission.year}"
                     disabled="#{!emissionsController.newMode}">
            <f:convertNumber integerOnly="true" />
        </p:inputText>

        <p:outputLabel value="Aktueller CO₂-Wert:" />
        <p:inputNumber value="#{emissionsController.selectedEmission.co2Kt}"
                       readonly="true" />

        <p:outputLabel value="Neuer / Pending CO₂-Wert:" />
        <p:inputNumber value="#{emissionsController.selectedEmission.co2KtPending}"
                       readonly="#{authController.editor}" />

    </p:panelGrid>

    <p:separator />

    <p:commandButton value="Speichern"
                     icon="pi pi-save"
                     action="#{emissionsController.save}"
                     process="@form"
                     update="backendForm:emissionsPanel backendForm:editDialog"
                     rendered="#{authController.scientist}"
                     oncomplete="if (!args.validationFailed) PF('editDialog').hide();" />

    <p:commandButton value="Validieren"
                     icon="pi pi-check"
                     action="#{emissionsController.validateEmission}"
                     process="@form"
                     update="backendForm:emissionsPanel backendForm:editDialog"
                     rendered="#{authController.editor}"
                     oncomplete="PF('editDialog').hide();" />

</p:dialog>
		
		
		
	

		<!-- Tabelle -->
		<h:panelGroup id="emissionsPanel"
			rendered="#{backendController.showEmissions}">

			<ui:include src="/snippets/emissionsTable.xhtml">
				<ui:param name="showEditColumn" value="#{authController.scientist}" />
				<ui:param name="showValidationColumn"
					value="#{authController.editor}" />
				<ui:param name="showBackendColumns"
					value="#{authController.scientist or authController.editor}" />
			</ui:include>

		</h:panelGroup>

	</h:form>

</h:body>
</html>
