<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<meta charset="UTF-8" />
	<title>Backend</title>
</h:head>

<h:body>

	<f:view>

		<!-- ✅ Zugriffsschutz -->
		<f:metadata>
			<f:viewAction action="#{authController.ensureLoggedIn}" />
		</f:metadata>

		<h1>Willkommen, #{authController.currentUser.username}</h1>

		<h:form>
			<p:commandButton value="Logout" icon="pi pi-sign-out"
				action="#{authController.logout}" ajax="false" />
		</h:form>

		<!-- ================= MENÜ ================= -->
		<h:form id="menuForm">
			<p:commandButton value="CO₂-Daten anzeigen" icon="pi pi-table"
				action="#{backendController.showEmissionsTable}"
				update="backendForm" styleClass="menu-button" />
		</h:form>

		<!-- ================= HAUPTFORM ================= -->
		<h:form id="backendForm">

			<!-- ✅ Neue Daten hinzufügen -->
			<p:commandButton value="Neue Daten hinzufügen" icon="pi pi-plus"
				actionListener="#{emissionsController.prepareNewEmission}"
				update="editDialog" oncomplete="PF('editDialog').show()"
				rendered="#{authController.scientist}" style="margin-bottom:15px" />

			<!-- ========= DIALOG ========= -->
			<p:dialog id="editDialog" widgetVar="editDialog" modal="true"
				closable="true"
				header="#{emissionsController.newMode 
				? 'Neue CO₂-Daten hinzufügen'
				: (authController.scientist 
					? 'CO₂-Daten bearbeiten' 
					: 'CO₂-Daten validieren')}">

				<p:messages />

				<p:panelGrid columns="2" style="width:100%" styleClass="ui-fluid">

					<!-- ================= LAND ================= -->
					<p:outputLabel value="Land:" />

					<p:selectOneMenu value="#{emissionsController.selectedCountryId}"
						rendered="#{emissionsController.newMode}">

						<f:selectItems value="#{emissionsController.countries}" var="c"
							itemValue="#{c.id}" itemLabel="#{c.name}" />
					</p:selectOneMenu>


					<p:inputText
						value="#{emissionsController.selectedEmission.country.name}"
						readonly="true" rendered="#{!emissionsController.newMode}" />

					<!-- ================= JAHR ================= -->
					<p:outputLabel value="Jahr:" />

					<p:inputText
					    value="#{emissionsController.selectedEmission.year}"
					    rendered="#{emissionsController.newMode}"
					    required="true"
					    requiredMessage="Jahr ist erforderlich">
					    
					    <f:convertNumber integerOnly="true" />
					</p:inputText>


					<p:inputText value="#{emissionsController.selectedEmission.year}"
						readonly="true" rendered="#{!emissionsController.newMode}" />

					<!-- ================= AKTUELLER WERT ================= -->
					<p:outputLabel value="Aktueller CO₂-Wert:"
						rendered="#{!emissionsController.newMode}" />

					<p:inputNumber
						value="#{emissionsController.selectedEmission.co2Kt}"
						readonly="true" rendered="#{!emissionsController.newMode}" />

					<!-- ================= NEUER / PENDING ================= -->
					<p:outputLabel value="Neuer / Pending CO₂-Wert:" />

					<p:inputNumber
						value="#{emissionsController.selectedEmission.co2KtPending}"
						readonly="#{authController.editor}" />

				</p:panelGrid>

				<p:separator />

				<!-- ================= BUTTONS ================= -->

				<!-- Speichern (Wissenschaftler) -->
				<p:commandButton value="Speichern" icon="pi pi-save"
					action="#{emissionsController.save}" process="@form" update="@form"
					rendered="#{authController.scientist}"
					oncomplete="if (!args.validationFailed) PF('editDialog').hide();" />

				<!-- Validieren (Herausgeber) -->
				<p:commandButton value="Validieren" icon="pi pi-check"
					action="#{emissionsController.validateEmission}" process="@form"
					update=":backendForm:emissionsPanel editDialog"
					rendered="#{authController.editor}"
					oncomplete="PF('editDialog').hide()" />

			</p:dialog>

			<!-- ========= TABELLE ========= -->
			<h:panelGroup id="emissionsPanel"
				rendered="#{backendController.showEmissions}">

				<ui:include src="/snippets/emissionsTable.xhtml">
					<ui:param name="showEditColumn" value="#{authController.scientist}" />
					<ui:param name="showValidationColumn"
						value="#{authController.editor}" />
					<ui:param name="showBackendColumns"
						value="#{authController.scientist or authController.editor}" />
				</ui:include>

			</h:panelGroup>

		</h:form>

	</f:view>

</h:body>
</html>
