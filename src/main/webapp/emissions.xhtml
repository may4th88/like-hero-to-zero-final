<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<meta charset="UTF-8" />
	<title>CO₂-Emissionen</title>
</h:head>

<h:body>

	<h1>Aktuelle CO₂-Emissionen</h1>

	<p>Übersicht der jeweils aktuellsten CO₂-Emissionswerte pro Land.</p>

	<h2>Welche Staatsbürgerschaft besitzen Sie?</h2>
	<div class="card">
		<h:form>
			<p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true" />

			<p:panel header="Select a Location" style="margin-bottom:10px;">
				<h:panelGrid columns="2" cellpadding="5">
					<p:outputLabel for="country" value="Country: " />
					<p:selectOneMenu id="country"
						value="#{emissionsController.selectedCountryId}">
						<f:selectItem itemLabel="Select Country" itemValue="#{null}" />
						<f:selectItems value="#{emissionsController.countries}" var="c"
							itemLabel="#{c.name}" itemValue="#{c.id}" />
					</p:selectOneMenu>


				</h:panelGrid>

				<p:divider />

				<p:commandButton value="Submit" update="singleCountryOutput" icon="pi pi-check"
					/>
			</p:panel>

		</h:form>
		<h:outputText id="singleCountryOutput" value="#{emissionsController.singleSelectedCountry.name}"></h:outputText>
	</div>

	<h:form>
	    <ui:include src="/snippets/emissionsTable.xhtml">
	        <ui:param name="showEditColumn" value="false" />
	    </ui:include>
	</h:form>




</h:body>
</html>
