<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>CO₂-Emissionen</title>
</h:head>

<h:body>

    <h1>Aktuelle CO₂-Emissionen</h1>

    <p>
        Übersicht der jeweils aktuellsten CO₂-Emissionswerte pro Land.
    </p>

    <p:dataTable value="#{emissionsController.latestEmissions}"
                 var="e"
                 stripedRows="true"
                 paginator="true"
                 rows="10">

        <p:column headerText="Land">
            #{e.country.name}
        </p:column>

        <p:column headerText="Jahr">
            #{e.year}
        </p:column>

        <p:column headerText="CO₂-Emissionen">
            #{e.co2Kt} #{e.unit}
        </p:column>

    </p:dataTable>

</h:body>
</html>
