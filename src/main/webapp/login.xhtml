<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8"/>
    <title>Login – Like Hero To Zero</title>
</h:head>

<h:body>

<h1>Backend Login</h1>

<h:form id="loginForm">

    <p:panel header="Bitte anmelden" style="max-width:420px;">

        <p:messages id="msgs" showDetail="true" closable="true"/>

        <p:panelGrid columns="2" columnClasses="label,value" styleClass="ui-fluid">

            <p:outputLabel for="username" value="Benutzername"/>
            <p:inputText id="username" value="#{authController.loginUser.username}" required="true"/>

            <p:outputLabel for="password" value="Passwort"/>
            <p:password id="password" value="#{authController.loginUser.password}" required="true"/>

        </p:panelGrid>

        <p:separator/>

        <p:commandButton value="Login"
                         icon="pi pi-sign-in"
                         action="#{authController.login}"
                         update="msgs"
                         process="@form"/>

    </p:panel>

</h:form>

</h:body>
</html>
