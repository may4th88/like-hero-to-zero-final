<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <p:dataTable id="emissionTable"
        value="#{emissionsController.latestEmissions}"
        var="e"
        stripedRows="true"
        paginator="true"
        rows="10"
        style="table-layout: fixed; width: 100%;">

        <p:column headerText="Land" style="width: 28%;">
            #{e.country.name}
        </p:column>

        <p:column headerText="Jahr" style="width: 9%; text-align: center;">
            #{e.year}
        </p:column>

        <p:column headerText="CO₂-Emissionen in Mio. t"
            style="width: 14rem; text-align: right; padding-right: 9rem;"
            headerStyle="text-align: right; padding-right: 9rem;">
            <h:outputText value="#{e.co2Value}" />
        </p:column>

        <p:column headerText="Status"
            rendered="#{showBackendColumns}"
            style="width: 10%; text-align: center;">
            #{e.status}
        </p:column>

        <p:column headerText="CO₂-Emissionen in Mio. t (pending)"
            rendered="#{showBackendColumns}"
            style="width: 16rem; text-align: right; padding-right: 9rem;"
            headerStyle="text-align: right; padding-right: 9rem;">
            <h:outputText value="#{e.co2ValuePending}" />
        </p:column>

        <p:column headerText="Bearbeitung"
            rendered="#{showEditColumn}"
            style="width: 8%; text-align: center;">
            <p:commandButton icon="pi pi-pencil"
                process="@this"
                update=":backendForm:editDialog"
                actionListener="#{emissionsController.selectEmission(e)}"
                oncomplete="PF('editDialog').show()" />
        </p:column>

        <p:column headerText="Validation"
            rendered="#{showValidationColumn}"
            style="width: 8%; text-align: center;">
            <p:commandButton icon="pi pi-check"
                process="@this"
                update=":backendForm:editDialog"
                actionListener="#{emissionsController.selectEmission(e)}"
                oncomplete="PF('editDialog').show()" />
        </p:column>

    </p:dataTable>

</ui:composition>
